server:
  port: 8889
spring:
  application:
    name: ai-rag-sample
  datasource:
    url: jdbc:postgresql://localhost:5432/ai_demo
    username: ai_user
    password: ai_user
  ai:
    openai:
      api-key: ${OPENAI_API_KEY}
      base-url: https://dashscope.aliyuncs.com/compatible-mode/v1
      chat:
        options:
          model: qwen-plus
          temperature: 0.2
      embedding:
        model: text-embedding-v3   # Embedding 模型（用于 RAG 向量化）
    vectorstore:
      pgvector:
        dimensions: 1024           # text-embedding-v3 向量维度
        initialize-schema: false   # 设为false，手动执行 psql -U postgres -f init_ai_demo.sql

management:
  endpoints:
    web:
      exposure:
        include: health,info
