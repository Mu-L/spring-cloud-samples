spring:
  application:
    name: stream-sample
  cloud:
    function:
      definition: input;input2;output2
    stream:
      rocketmq:
        binder:
          name-server: 127.0.0.1:9876
      bindings:
        input-in-0:
          destination: stream-demo-topic
          group: stream-demo-consumer-group
        output-out-0:
          destination: stream-demo-topic
        input2-in-0:
          destination: stream-demo-topic2
          group: stream-demo-consumer-group2
        output2-out-0:
          destination: stream-demo-topic2
