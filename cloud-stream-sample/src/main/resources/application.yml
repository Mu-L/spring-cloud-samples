server:
  port: 8767
management:
  endpoints:
    web:
      exposure:
        include: health,bindings
spring:
  application:
    name: stream-sample
  cloud:
    function:
      definition: input;input2;output2;transform;transformPublish;delay;fifo;tx
    stream:
      rocketmq:
        binder:
          name-server: ${ROCKETMQ_NAME_SERVER:127.0.0.1:9876}
        bindings:
          txPublish-out-0:
            producer:
              producerType: Trans
              transactionListener: demoTransactionListener
      bindings:
        # 场景1: 基础消费 - stream-demo-topic
        input-in-0:
          destination: stream-demo-topic
          group: stream-demo-consumer-group
        output-out-0:
          destination: stream-demo-topic
        # 场景2: 定时消息源 - stream-demo-topic2
        input2-in-0:
          destination: stream-demo-topic2
          group: stream-demo-consumer-group2
        output2-out-0:
          destination: stream-demo-topic2
          producer:
            poller:
              fixed-delay: 1000
        # 场景3: 消息处理管道 - transform 函数
        transform-in-0:
          destination: stream-transform-topic
          group: stream-transform-group
        transform-out-0:
          destination: stream-demo-topic2
        # 场景3辅助: REST API 通过 binder 发布到 transform 输入 topic
        transformPublish-out-0:
          destination: stream-transform-topic
        # 场景4: 延迟消息 - stream-delay-topic
        delay-in-0:
          destination: stream-delay-topic
          group: stream-delay-group
        delayPublish-out-0:
          destination: stream-delay-topic
        # 场景5: 顺序消息 - stream-fifo-topic
        fifo-in-0:
          destination: stream-fifo-topic
          group: stream-fifo-group
          consumer:
            orderly: true
        fifoPublish-out-0:
          destination: stream-fifo-topic
          producer:
            orderly: true
            # 需与 Topic 队列数一致，否则 rocketmq binder 懒初始化时 partitioningInterceptor 为 null 导致 NPE
            partitionCount: 8
            partitionKeyExpression: headers['ORDER_KEY']
        # 场景6: 事务消息 - stream-tx-topic
        tx-in-0:
          destination: stream-tx-topic
          group: stream-tx-group
        txPublish-out-0:
          destination: stream-tx-topic
