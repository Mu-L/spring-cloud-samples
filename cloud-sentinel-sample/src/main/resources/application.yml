server:
  port: 8767
spring:
  application:
    name: cloud-sentinel-sample
  cloud:
    nacos:
      username: nacos
      password: 7fDJZBbiLzO2
      discovery:
        server-addr: 127.0.0.1:8848
        enabled: true
    sentinel:
      transport:
        dashboard: localhost:8081
      block-page: /errorPage
      eager: true
      datasource:
        ds1:
          file:
            file: classpath:flowrule.json
            data-type: json
            rule-type: flow
        ds2:
          file:
            file: classpath:degraderule.json
            data-type: json
            rule-type: degrade
        ds3:
          file:
            file: classpath:authority.json
            data-type: json
            rule-type: authority
        ds4:
          file:
            file: classpath:system.json
            data-type: json
            rule-type: system
        ds5:
          file:
            file: classpath:param-flow.json
            data-type: json
            rule-type: param_flow
        ds6:
          nacos:
            server-addr: 127.0.0.1:8848
            username: nacos
            password: 7fDJZBbiLzO2
            data-id: flowrule.json
            data-type: json
            rule-type: flow


feign:
  sentinel:
    enabled: true

management:
  otlp:
    metrics:
      export:
        enabled: false
  endpoint:
    web:
      exposure:
        include: "*"
    health:
      show-details: always
      diskSpace:
        enabled: false
