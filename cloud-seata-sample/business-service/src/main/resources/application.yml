server:
  port: 18081

spring:
  application:
    name: business-service
  cloud:
    nacos:
      username: nacos
      password: 7fDJZBbiLzO2
      discovery:
        server-addr: 127.0.0.1:8848

management:
  otlp:
    metrics:
      export:
        enabled: false
  tracing:
    sampling:
      probability: 1.0
  endpoints:
    web:
      exposure:
        include: health,info,prometheus

dubbo:
  application:
    name: ${spring.application.name}
    qos-port: 22230
  registry:
    id: nacos-registry
    address: nacos://127.0.0.1:8848
    username: ${spring.cloud.nacos.username:nacos}
    password: ${spring.cloud.nacos.password:7fDJZBbiLzO2}
    parameters:
      group: DEFAULT_GROUP
  tracing:
    enabled: true

seata:
  enabled: true
  application-id: ${spring.application.name}
  tx-service-group: ${spring.application.name}-tx-group
  config:
    type: nacos
    nacos:
      serverAddr: 127.0.0.1:8848
      dataId: "seata.properties"
      group: SEATA_GROUP
      username: ${spring.cloud.nacos.username}
      password: ${spring.cloud.nacos.password}
  registry:
    type: nacos
    nacos:
      cluster: default
      group: SEATA_GROUP
      application: seata-server
      server-addr: 127.0.0.1:8848
      username: ${spring.cloud.nacos.username}
      password: ${spring.cloud.nacos.password}
