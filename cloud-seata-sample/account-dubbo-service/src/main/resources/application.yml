spring:
  application:
    name: account-dubbo-service
  cloud:
    nacos:
      username: nacos
      password: 7fDJZBbiLzO2
      discovery:
        server-addr: ${NACOS_SERVER_ADDR:127.0.0.1:8848}
  datasource:
    name: accountDataSource
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${MYSQL_HOST:127.0.0.1}:3306/seata?useSSL=false&serverTimezone=UTC
    username: root
    password: root1234

dubbo:
  application:
    name: ${spring.application.name}
    qos-port: 22227
  protocol:
    name: tri
    port: 50071
  registry:
    id: nacos-registry
    address: nacos://${NACOS_SERVER_ADDR:127.0.0.1:8848}
    username: ${spring.cloud.nacos.username:nacos}
    password: ${spring.cloud.nacos.password:7fDJZBbiLzO2}
    register-mode: instance
    parameters:
      group: DEFAULT_GROUP
  tracing:
    enabled: true

management:
  otlp:
    metrics:
      export:
        enabled: false
  tracing:
    sampling:
      probability: 1.0
  endpoints:
    web:
      exposure:
        include: health,info

seata:
  enabled: true
  application-id: ${spring.application.name}
  tx-service-group: ${spring.application.name}-tx-group
  config:
    type: nacos
    nacos:
      serverAddr: ${NACOS_SERVER_ADDR:127.0.0.1:8848}
      dataId: "seata.properties"
      group: SEATA_GROUP
      username: ${spring.cloud.nacos.username}
      password: ${spring.cloud.nacos.password}
  registry:
    type: nacos
    nacos:
      application: seata-server
      server-addr: ${NACOS_SERVER_ADDR:127.0.0.1:8848}
      cluster: default
      group: SEATA_GROUP
      username: ${spring.cloud.nacos.username}
      password: ${spring.cloud.nacos.password}
