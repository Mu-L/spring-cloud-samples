server:
  port: 8763
spring:
  application:
    name: consumer-reactive-sample
  cloud:
    nacos:
      username: nacos
      password: 7fDJZBbiLzO2
      discovery:
        server-addr: ${NACOS_SERVER_ADDR:127.0.0.1:8848}

management:
  otlp:
    metrics:
      export:
        enabled: false
  tracing:
    sampling:
      probability: 1.0
  endpoints:
    web:
      exposure:
        include: health,info

dubbo:
  application:
    name: ${spring.application.name}
    qos-port: 22225
  protocol:
    name: tri
    port: -1
  registry:
    id: nacos-registry
    address: nacos://${NACOS_SERVER_ADDR:127.0.0.1:8848}
    username: ${spring.cloud.nacos.username}
    password: ${spring.cloud.nacos.password}
    parameters:
      group: DEFAULT_GROUP
  tracing:
    enabled: true
