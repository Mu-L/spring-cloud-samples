server:
  port: 8888
spring:
  application:
    name: ai-sample
  datasource:
    url: jdbc:postgresql://localhost:5432/ai_demo
    username: ai_user
    password: ai_user
  ai:
    openai:
      api-key: ${OPENAI_API_KEY}
      base-url: https://dashscope.aliyuncs.com/compatible-mode/v1
      chat:
        options:
          model: qwen-plus # 纯文本模型
          temperature: 0.7
      vision:
        model: qwen3.7-plus # 多模态视觉模型（需支持图像输入）
    deepseek:
      api-key: ${DEEPSEEK_API_KEY}
      base-url: https://api.deepseek.com
      chat:
        options:
          model: deepseek-v4-pro
          temperature: 0.7
    mcp:
      server:
        name: spring-cloud-samples-mcp-server    # MCP 服务名称，Client 连接时使用
        version: 1.0.0                            # 服务版本
        type: SYNC                                # 运行模式：SYNC（同步）或 ASYNC（异步）
    chat:
      memory:
        repository:
          jdbc:
            initialize-schema: always  # 自动创建 spring_ai_chat_memory 表

management:
  endpoints:
    web:
      exposure:
        include: health,info
